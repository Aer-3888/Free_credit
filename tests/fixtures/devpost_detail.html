<!DOCTYPE html>
<html lang="en">
<head>
  <title>AWS Cloud Hack 2026 | Devpost</title>
</head>
<body>
  <div id="challenge-page">
    <header class="challenge-header">
      <h1>AWS Cloud Hack 2026</h1>
    </header>

    <div id="challenge-sidebar">
      <h3>Hosted by</h3>
      <div class="challenge-host">
        <span>Amazon Web Services</span>
      </div>

      <h3>Sponsors</h3>
      <div id="challenge-sponsors">
        <div class="sponsor">
          <a href="https://aws.amazon.com">
            <img src="/img/aws-logo.png" alt="Amazon Web Services" />
          </a>
        </div>
        <div class="sponsor">
          <a href="https://mongodb.com">
            <img src="/img/mongo-logo.png" alt="MongoDB" />
          </a>
        </div>
        <div class="sponsor">
          <a href="https://github.com">
            <img src="/img/github-logo.png" alt="GitHub" />
          </a>
        </div>
      </div>
    </div>

    <div id="challenge-description">
      <p>Join us for the biggest cloud hackathon of 2026! Build innovative projects using
         AWS services and compete for over $50,000 in prizes. Every participant receives
         $100 in AWS credits.</p>
    </div>

    <div class="prizes">
      <h2>Prizes</h2>
      <div class="prize">
        <h3>Grand Prize</h3>
        <p>$25,000</p>
      </div>
      <div class="prize">
        <h3>Runner Up</h3>
        <p>$15,000</p>
      </div>
    </div>
  </div>
</body>
</html>
