name: Scrape Free Credit Events

on:
  schedule:
    # Run daily at 6:17 AM UTC (odd minute to avoid contention)
    - cron: '17 6 * * *'
  workflow_dispatch: # Allow manual triggers

permissions: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DATA_PATH: data/events.json
      SCORE_THRESHOLD: '0.3'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pinned dependencies
        run: pip install --require-hashes --no-deps -r requirements.lock

      - name: Install project (no-deps, editable)
        run: pip install --no-deps -e .

      - name: Run scraper
        run: python -m src.main

      - name: Commit updated data
        env:
          COMMIT_DATE: ${{ github.event.repository.updated_at }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --cached --quiet || git commit -m "chore: update scraped events"
          git push

  keepalive:
    # Prevent GitHub from disabling the workflow after 60 days of inactivity.
    # NOTE: gautamkrishnar/keepalive-workflow was removed because the repository
    # is blocked by GitHub for TOS violations (since 2025-04-21). This inline
    # approach achieves the same result without a third-party dependency.
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive workflow trigger"
          git push
